name: Crawl tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  crawl:
    name: Verify crawlable HTML (no-JS fetch)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build + serve + crawl test
        run: pnpm test:crawl
